<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title | escape }} · {% endif %}{{ site.title | escape }}</title>
    {% if page.description or site.description %}<meta name="description" content="{{ page.description | default: site.description | escape }}">{% endif %}
    <meta name="theme-color" content="#0D1B2A">
    <link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="any">
    <link rel="stylesheet" href="https://assets.portussophia.com/styles/v1/site.css?v=1">
    <link rel="stylesheet" href="https://assets.portussophia.com/styles/v1/background-sailcloth.css?v=1">
    <link rel="stylesheet" href="https://assets.portussophia.com/styles/v1/jekyll-shell.css?v=1">
    <link rel="stylesheet" href="https://assets.portussophia.com/styles/v1/jekyll-shell-shoreline-identity.css?v=1">
    <link rel="stylesheet" href="https://assets.portussophia.com/styles/v1/jekyll-shell-shoreline-reading.css?v=1">
    <link rel="stylesheet" href="https://assets.portussophia.com/styles/v1/jekyll-shell-shoreline-mobile.css?v=1">
    <style>
      body { margin: 0; color: #17212b; background: #f7f3ea; font-family: Georgia, 'Times New Roman', serif; }
      .skip-link { position: absolute; left: -9999px; }
      .skip-link:focus { left: 1rem; top: 1rem; z-index: 10; background: #fff; padding: .6rem .9rem; }
      .ps-node-header { min-height: 12rem; display: flex; align-items: end; border-bottom: 4px solid #d5a83f; background: linear-gradient(rgba(13,27,42,.42), rgba(13,27,42,.88)), url('https://assets.portussophia.com/img/site/shoreline.jpg') center 48% / cover no-repeat; color: #fff; }
      .ps-node-header .shell { width: min(72rem, calc(100% - 2rem)); margin: 0 auto; padding: 2.5rem 0 1.8rem; }
      .ps-node-title { color: #fff; text-decoration: none; font-size: clamp(1.7rem, 4vw, 3rem); font-weight: 700; }
      .ps-node-description { max-width: 52rem; margin: .55rem 0 0; color: #f4ead2; line-height: 1.55; }
      .site-main { min-height: 55vh; }
      .home-apex, .shoreline-reading-inner { width: min(72rem, calc(100% - 2rem)); margin: 0 auto; padding: 2.5rem 0 4rem; }
      .shoreline-opening-inner { width: min(72rem, calc(100% - 2rem)); margin: 0 auto; padding: 2rem 0; }
      .site-footer { border-top: 1px solid #c8bfae; background: #0d1b2a; color: #f4ead2; }
      .site-footer .shell { width: min(72rem, calc(100% - 2rem)); margin: 0 auto; padding: 1.5rem 0 2rem; text-align: center; }
      .site-footer a { color: #f0b53f; }
      img { max-width: 100%; }
    </style>
  </head>
  <body class="layout-{{ page.layout | default: 'default' }}{% if page.url == '/' %} is-home{% endif %}">
    <div class="site-frame">
      <a class="skip-link" href="#main-content">Skip to main content</a>
      <header class="site-header ps-node-header" role="banner">
        <div class="shell">
          <a class="ps-node-title" href="{{ '/' | relative_url }}">{{ site.title | escape }}</a>
          {% if site.description %}<p class="ps-node-description">{{ site.description | escape }}</p>{% endif %}
        </div>
      </header>
      <main id="main-content" class="site-main" tabindex="-1">{{ content }}</main>
      <footer class="site-footer">
        <div class="shell">
          <p><em>Here and Now!</em></p>
          <p>Copyright © 2026 PortusSophia, LLC · <a href="{{ '/LICENSE.md' | relative_url }}">License</a> · <a href="{{ '/RIGHTS.md' | relative_url }}">Rights &amp; Use</a></p>
        </div>
      </footer>
    </div>
  </body>
</html>
